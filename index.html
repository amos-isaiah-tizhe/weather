<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneXportal Weather App</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1><i class="fa-solid fa-cloud-sun"></i> Weather App</h1>

        <div class="search-box">
            <input type="text" id="locationInput" placeholder="Enter a city">
            <button id="searchButton">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>

        <button id="currentLocation" class="location-btn">
            <i class="fa-solid fa-location-crosshairs"></i> Use My Location
        </button>

        <div class="weather-info">
            <div class="left-info">
            <h2 id="location"></h2>

            <img id="weatherIcon" />
</div>
<div class="right-info">
            <p id="temperature"></p>
            <p id="description"></p>
            </div>
             <div id="forecast"></div>
             <!-- Humidity and wind speed -->
             <div class="humidity-windSpeed">
  <p id="humidity">
    <i class="fa-solid fa-droplet"></i>
    <span class="stat-value"></span>
    <span class="stat-label">Humidity</span>
  </p>
  <p id="windSpeed">
    <i class="fa-solid fa-wind"></i>
    <span class="stat-value"></span>
    <span class="stat-label">Wind Speed</span>
  </p>
    <p id="feelsLike">
   <i class="fas fa-temperature-half"></i>
    <span class="stat-value"></span>
    <span class="stat-label">Feels Like</span>
  </p>
</div>
        </div>
    </div>
    <footer>
       <p> Developed by | <a href="https://www.google.com/search?q=who+is+amos+isaiah+tizhe+?" target="_blank">Amos Isaiah Tizhe</a></p>
    </footer>
  <script type="module" src="app.js"></script>
</body>
</html>
